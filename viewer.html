<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viewer - 3D Printer File Utility</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="viewer">
  <div class="container">
    <header>
      <a href="index.html" class="back-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Back
      </a>
      <h1>3D <span class="accent">Viewer</span></h1>
      <p class="subtitle">Preview and inspect 3D files</p>
    </header>

    <!-- File Upload -->
    <div class="card">
      <h2>Upload</h2>
      <div class="file-drop-zone" id="dropZone">
        <div class="icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
          </svg>
        </div>
        <div class="text">Drop your file here or <strong>click to browse</strong></div>
        <div class="supported-formats">OBJ, STL, GLB, 3MF</div>
        <input type="file" id="fileInput">
      </div>
      <div class="file-info" id="fileInfo">
        <strong id="fileName"></strong><br>
        <span id="fileStats"></span>
      </div>
    </div>

    <!-- 3D Viewer -->
    <div class="card" id="viewerCard" style="display: none;">
      <h2>Preview</h2>
      <div class="viewer-wrapper">
        <div id="viewer3DContainer" class="viewer-container"></div>
        <div class="viewer-buttons">
          <button class="btn-viewer active" id="toggleAoBtn" title="Toggle Ambient Occlusion">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 0 0 0 20"/>
            </svg>
            AO
          </button>
          <button class="btn-viewer active" id="toggleShadowBtn" title="Toggle Ground Shadow">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <ellipse cx="12" cy="19" rx="9" ry="3"/><circle cx="12" cy="10" r="7"/>
            </svg>
            Shadow
          </button>
          <button class="btn-viewer" id="toggleSettingsBtn" title="Viewer Settings">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
            </svg>
          </button>
          <button class="btn-viewer" id="exportPreviewPngBtn" style="display: none;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/>
            </svg>
            PNG
          </button>
          <button class="btn-viewer" id="exportPreviewObjBtn" style="display: none;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
            </svg>
            OBJ
          </button>
        </div>
        <div class="viewer-settings" id="viewerSettings">
          <div class="viewer-setting-row">
            <label>AO Strength</label>
            <input type="range" id="aoStrengthSlider" min="0" max="2" step="0.05" value="0.7">
            <span class="setting-value" id="aoStrengthValue">0.7</span>
          </div>
          <div class="viewer-setting-row">
            <label>Shadow Opacity</label>
            <input type="range" id="shadowOpacitySlider" min="0" max="0.5" step="0.01" value="0.12">
            <span class="setting-value" id="shadowOpacityValue">0.12</span>
          </div>
          <div class="viewer-setting-row">
            <label>Shadow Spread</label>
            <input type="range" id="shadowSpreadSlider" min="1" max="200" step="1" value="100">
            <span class="setting-value" id="shadowSpreadValue">100</span>
          </div>
          <div class="viewer-setting-row">
            <label>Brightness</label>
            <input type="range" id="brightnessSlider" min="0.5" max="2" step="0.05" value="1">
            <span class="setting-value" id="brightnessValue">1.00</span>
          </div>
          <div class="viewer-setting-row">
            <label>Contrast</label>
            <input type="range" id="contrastSlider" min="0.5" max="2" step="0.05" value="1">
            <span class="setting-value" id="contrastValue">1.00</span>
          </div>
          <div class="viewer-setting-row">
            <label>Saturation</label>
            <input type="range" id="saturationSlider" min="0" max="2" step="0.05" value="1">
            <span class="setting-value" id="saturationValue">1.00</span>
          </div>
          <div class="viewer-setting-row">
            <label>Temperature</label>
            <input type="range" id="temperatureSlider" min="-0.3" max="0.3" step="0.01" value="0">
            <span class="setting-value" id="temperatureValue">0.00</span>
          </div>
          <div class="viewer-setting-row">
            <label>Rotation</label>
            <div class="rotation-buttons">
              <button class="btn-rotate" id="rotateX" title="Rotate X +90°">X</button>
              <button class="btn-rotate" id="rotateY" title="Rotate Y +90°">Y</button>
              <button class="btn-rotate" id="rotateZ" title="Rotate Z +90°">Z</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Loader Overlay -->
  <div class="loader-overlay" id="loaderOverlay">
    <div class="loader-content">
      <div class="loader-spinner"></div>
      <div class="loader-text" id="loaderText">Loading...</div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/FXAAShader.js"></script>
  <script src="js/Color.js"></script>
  <script src="js/state.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/pickedPaletteStorage.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/fileHandling.js"></script>
  <script src="js/objParser.js"></script>
  <script src="js/stlParser.js"></script>
  <script src="js/glbParser.js"></script>
  <script src="js/3mfParser.js"></script>
  <script src="js/adjacency.js"></script>
  <script src="js/colorProcessing.js"></script>
  <script src="js/islands.js"></script>
  <script src="js/export.js"></script>
  <script src="js/textureQuantization.js"></script>
  <script src="js/texturePreview.js"></script>
  <script src="js/viewer3D.js"></script>
  <script src="js/colorPicker.js"></script>
  <script src="js/pickedPalette.js"></script>
  <script src="js/processing.js"></script>
  <script src="js/modal.js"></script>
  <script src="js/tabs.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
